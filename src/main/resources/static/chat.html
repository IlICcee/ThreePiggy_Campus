<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园 AI 助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 700px;
            max-width: 95vw;
            height: 85vh;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #1677ff, #0958d9);
            color: #fff;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .message.user {
            align-self: flex-end;
            background: #1677ff;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.ai {
            align-self: flex-start;
            background: #f0f2f5;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .message.loading {
            background: #f0f2f5;
            color: #999;
            align-self: flex-start;
        }
        .chat-input-area {
            border-top: 1px solid #e8e8e8;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d9d9d9;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .chat-input-area input:focus {
            border-color: #1677ff;
        }
        .chat-input-area button {
            padding: 10px 20px;
            background: #1677ff;
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-input-area button:hover { background: #0958d9; }
        .chat-input-area button:disabled { background: #b0b0b0; cursor: not-allowed; }
        .quick-actions {
            display: flex;
            gap: 8px;
            padding: 0 16px 8px;
            flex-wrap: wrap;
        }
        .quick-action {
            padding: 6px 12px;
            background: #f0f2f5;
            border: 1px solid #e8e8e8;
            border-radius: 14px;
            font-size: 12px;
            cursor: pointer;
            color: #555;
            transition: all 0.2s;
        }
        .quick-action:hover {
            background: #e6f4ff;
            border-color: #1677ff;
            color: #1677ff;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">🏫 校园 AI 助手</div>
        <div class="chat-messages" id="messages">
            <div class="message ai">你好！我是校园 AI 助手 🤖<br>你可以问我关于学校公告、考试安排等问题。试试下面的快捷提问吧~</div>
        </div>
        <div class="quick-actions">
            <span class="quick-action" onclick="sendQuick('最近有什么通知？')">📢 最近通知</span>
            <span class="quick-action" onclick="sendQuick('期末考试是什么时候？')">📝 考试安排</span>
            <span class="quick-action" onclick="sendQuick('图书馆什么时候开门？')">📚 图书馆</span>
            <span class="quick-action" onclick="sendQuick('奖学金评选结果是什么？')">🏆 奖学金</span>
            <span class="quick-action" onclick="sendQuick('毕业生需要办理什么手续？')">🎓 毕业手续</span>
        </div>
        <div class="chat-input-area">
            <input id="input" type="text" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')send()" autofocus>
            <button id="sendBtn" onclick="send()">发送</button>
        </div>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('input');
            const btn = document.getElementById('sendBtn');
            const msg = input.value.trim();
            if (!msg) return;

            appendMessage('user', msg);
            input.value = '';
            input.disabled = true;
            btn.disabled = true;

            const loadingDiv = appendMessage('loading', '思考中...');

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                loadingDiv.remove();
                const text = await res.text();
                if (res.ok) {
                    appendMessage('ai', text);
                } else {
                    appendMessage('ai', '❌ 请求失败: ' + text);
                }
            } catch (e) {
                loadingDiv.remove();
                appendMessage('ai', '❌ 网络错误，请确保后端已启动');
            }
            input.disabled = false;
            btn.disabled = false;
            input.focus();
        }

        function sendQuick(msg) {
            document.getElementById('input').value = msg;
            send();
        }

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.textContent = content;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            return div;
        }
    </script>
</body>
</html>
