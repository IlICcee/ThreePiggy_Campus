<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FJUT · 校园AI助手</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        :root {
            --blue: #5B9BD5;
            --blue-light: #A8D4F0;
            --blue-pale: #E8F4FD;
            --blue-deep: #2C5F9E;
            --white: #FFFFFF;
            --text: #3A3A4A;
            --text-light: #6B6B7B;
            --shadow: 0 4px 20px rgba(91, 155, 213, 0.15);
            --shadow-hover: 0 8px 30px rgba(91, 155, 213, 0.25);
            --pink: #F8BBD0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', -apple-system, sans-serif;
            background: linear-gradient(180deg, #E8F4FD 0%, #D6ECFA 30%, #F0F7FD 60%, #FFFFFF 100%);
            background-attachment: fixed;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            color: var(--text);
        }

        /* ── 背景装饰 ── */
        .bg-decor { position: fixed; pointer-events: none; z-index: 0; }
        .cloud { background: rgba(255,255,255,0.7); border-radius: 50%; filter: blur(2px); }
        .cloud-1 { width: 180px; height: 60px; top: 8%; left: 5%; animation: floatCloud 8s ease-in-out infinite; }
        .cloud-2 { width: 140px; height: 48px; top: 15%; right: 8%; animation: floatCloud 10s ease-in-out infinite 2s; }
        .cloud-3 { width: 120px; height: 42px; top: 65%; left: 2%; animation: floatCloud 9s ease-in-out infinite 1s; }
        .cloud-4 { width: 100px; height: 36px; top: 75%; right: 5%; animation: floatCloud 7s ease-in-out infinite 3s; }

        .dot { background: rgba(91,155,213,0.12); border-radius: 50%; }
        .dot-1 { width: 24px; height: 24px; top: 25%; left: 10%; animation: bounceDot 3s ease-in-out infinite; }
        .dot-2 { width: 16px; height: 16px; top: 40%; right: 12%; animation: bounceDot 4s ease-in-out infinite 1s; }
        .dot-3 { width: 20px; height: 20px; top: 55%; left: 88%; animation: bounceDot 3.5s ease-in-out infinite 0.5s; }
        .dot-4 { width: 12px; height: 12px; top: 80%; left: 15%; animation: bounceDot 3.2s ease-in-out infinite 2s; }

        .pig-decor { opacity: 0.3; }
        .pig-decor-1 { top: 40%; left: 3%; animation: floatPig 9s ease-in-out infinite; }
        .pig-decor-2 { top: 70%; right: 3%; animation: floatPig 7s ease-in-out infinite 3s; }

        @keyframes floatCloud {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        @keyframes bounceDot {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-18px) scale(1.3); }
        }
        @keyframes floatPig {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }

        /* ── 主布局：左侧栏 + 右侧内容 ── */
        #app {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 0 16px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .brand-header {
            text-align: center;
            padding: 24px 0 14px;
        }
        .brand-logo {
            display: inline-block;
            background: linear-gradient(135deg, #2C5F9E, #5B9BD5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-logo h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
        }
        .brand-sub {
            font-size: 13px;
            color: var(--blue);
            letter-spacing: 4px;
            margin-top: 2px;
        }

        /* ── 主体：侧栏 + 内容 ── */
        .main-layout {
            display: flex;
            gap: 14px;
            flex: 1;
            min-height: 0;
        }

        /* ── 左侧功能栏 ── */
        .sidebar {
            width: 110px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sidebar-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            background: var(--white);
            border: 2px solid var(--blue-pale);
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            color: var(--blue-deep);
            font-weight: 500;
            transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
            user-select: none;
            white-space: nowrap;
        }
        .sidebar-btn:hover {
            background: #E8F4FD;
            border-color: var(--blue-light);
            transform: translateX(3px);
            box-shadow: 0 4px 12px rgba(91,155,213,0.18);
        }
        .sidebar-btn:active { transform: scale(0.96); }
        .sidebar-btn.active {
            background: linear-gradient(135deg, #5B9BD5, #4A8BC5);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 14px rgba(91,155,213,0.3);
        }
        .sidebar-icon { font-size: 18px; flex-shrink: 0; }

        /* ── 右侧内容区 ── */
        .content-area {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ── 欢迎卡片 ── */
        .welcome-card {
            position: relative;
            border-radius: 20px;
            padding: 0;
            box-shadow: var(--shadow);
            text-align: center;
            border: 2px solid var(--blue-pale);
            overflow: hidden;
            background: #fff;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 场景背景层 */
        .scene-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .welcome-card .content-wrap {
            position: relative;
            z-index: 2;
            padding: 22px 24px;
        }
        .welcome-avatar {
            font-size: 50px;
            display: block;
            margin-bottom: 6px;
            text-shadow: 0 2px 8px rgba(255,255,255,0.8);
        }
        .welcome-card h2 {
            font-size: 18px;
            color: var(--blue-deep);
            margin-bottom: 4px;
            text-shadow: 0 1px 4px rgba(255,255,255,0.7);
        }
        .welcome-card p {
            font-size: 13px;
            color: var(--text-light);
            line-height: 1.6;
            text-shadow: 0 1px 4px rgba(255,255,255,0.6);
        }
        /* 右下角三只猪头 Logo */
        .pigs-logo {
            position: absolute;
            bottom: 8px;
            right: 12px;
            z-index: 1;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        .welcome-card:hover .pigs-logo {
            opacity: 0.85;
        }

        /* ── 聊天卡片 ── */
        .chat-card {
            flex: 1;
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid var(--blue-pale);
            min-height: 380px;
            max-height: 52vh;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--blue-light);
            border-radius: 10px;
        }

        /* ── 消息气泡 ── */
        .msg-row {
            display: flex;
            gap: 8px;
            max-width: 85%;
            animation: msgIn 0.35s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(12px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .msg-row.ai { align-self: flex-start; }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

        .msg-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            background: var(--blue-pale);
        }
        .msg-row.user .msg-avatar { background: #D6E8FB; }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 13.5px;
            line-height: 1.65;
            word-break: break-word;
            white-space: pre-wrap;
            position: relative;
        }
        .msg-row.ai .msg-bubble {
            background: #F0F6FB;
            color: var(--text);
            border-bottom-left-radius: 5px;
        }
        .msg-row.user .msg-bubble {
            background: linear-gradient(135deg, #5B9BD5, #4A8BC5);
            color: #fff;
            border-bottom-right-radius: 5px;
        }
        .msg-row.ai .msg-bubble::after {
            content: '';
            position: absolute;
            left: -5px; bottom: 7px;
            border-right: 7px solid #F0F6FB;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
        }
        .msg-row.user .msg-bubble::after {
            content: '';
            position: absolute;
            right: -5px; bottom: 7px;
            border-left: 7px solid #4A8BC5;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
        }

        /* 加载点 */
        .loading-dots { display: flex; gap: 5px; padding: 4px 0; }
        .loading-dots span {
            width: 7px; height: 7px;
            background: var(--blue-light);
            border-radius: 50%;
            animation: dotBounce 1.2s ease-in-out infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1.3); opacity: 1; }
        }

        /* ── 输入区 ── */
        .input-area {
            display: flex;
            gap: 8px;
            padding: 10px 14px 14px;
            border-top: 2px solid var(--blue-pale);
        }
        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 2px solid #D6E8FA;
            border-radius: 22px;
            font-size: 13.5px;
            outline: none;
            background: #F8FBFE;
            color: var(--text);
            transition: all 0.3s;
        }
        .input-area input:focus {
            border-color: var(--blue);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(91,155,213,0.1);
        }
        .input-area input::placeholder { color: #B0C8DD; }
        .send-btn {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #5B9BD5, #3D7EC0);
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 16px rgba(91,155,213,0.4);
        }
        .send-btn:active { transform: scale(0.92); }
        .send-btn:disabled {
            background: #C8D9E8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── Footer ── */
        .brand-footer {
            text-align: center;
            padding: 18px 0 12px;
            font-size: 12px;
            color: var(--blue-light);
            letter-spacing: 1px;
        }
        .footer-pig { vertical-align: middle; margin-right: 2px; }
        .brand-footer strong { color: var(--blue); font-weight: 700; }

        /* ── 响应式 ── */
        @media (max-width: 650px) {
            .main-layout { flex-direction: column; }
            .sidebar {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 6px;
            }
            .sidebar-btn { padding: 8px 12px; font-size: 11px; border-radius: 14px; }
            .sidebar-btn:hover { transform: translateY(-2px); }
            .sidebar-icon { font-size: 15px; }
            .chat-card { max-height: 45vh; }
            .brand-logo h1 { font-size: 22px; }
            .msg-row { max-width: 92%; }
        }
    </style>
</head>
<body>

    <!-- 背景装饰 -->
    <div class="bg-decor cloud cloud-1"></div>
    <div class="bg-decor cloud cloud-2"></div>
    <div class="bg-decor cloud cloud-3"></div>
    <div class="bg-decor cloud cloud-4"></div>
    <div class="bg-decor dot dot-1"></div>
    <div class="bg-decor dot dot-2"></div>
    <div class="bg-decor dot dot-3"></div>
    <div class="bg-decor dot dot-4"></div>
    <svg class="bg-decor pig-decor pig-decor-1" viewBox="0 0 50 50" width="32" height="32">
        <ellipse cx="25" cy="28" rx="15" ry="12" fill="none" stroke="#F8BBD0" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="25" cy="17" r="11" fill="none" stroke="#F8BBD0" stroke-width="1.8"/>
        <circle cx="20" cy="15" r="1.5" fill="#F8BBD0"/>
        <circle cx="30" cy="15" r="1.5" fill="#F8BBD0"/>
        <ellipse cx="25" cy="22" rx="4" ry="3" fill="none" stroke="#F8BBD0" stroke-width="1.5"/>
        <circle cx="22.5" cy="21" r="0.8" fill="#F4A0B8"/>
        <circle cx="27.5" cy="21" r="0.8" fill="#F4A0B8"/>
        <path d="M10 16 Q7 22 11 26" stroke="#F8BBD0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M40 16 Q43 22 39 26" stroke="#F8BBD0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>
    <svg class="bg-decor pig-decor pig-decor-2" viewBox="0 0 50 50" width="24" height="24">
        <ellipse cx="25" cy="28" rx="14" ry="11" fill="none" stroke="#F8BBD0" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="25" cy="18" r="10" fill="none" stroke="#F8BBD0" stroke-width="1.8"/>
        <circle cx="21" cy="17" r="1.5" fill="#F8BBD0"/>
        <circle cx="29" cy="17" r="1.5" fill="#F8BBD0"/>
        <ellipse cx="25" cy="23" rx="3.5" ry="2.5" fill="none" stroke="#F8BBD0" stroke-width="1.5"/>
        <circle cx="23" cy="22" r="0.8" fill="#F4A0B8"/>
        <circle cx="27" cy="22" r="0.8" fill="#F4A0B8"/>
        <path d="M10 17 Q7 23 11 26" stroke="#F8BBD0" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        <path d="M40 17 Q43 23 39 26" stroke="#F8BBD0" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    </svg>

    <div id="app">
        <!-- 顶部 -->
        <header class="brand-header">
            <div class="brand-logo">
                <h1>FJUT · 校园助手</h1>
            </div>
            <p class="brand-sub">福建理工大学</p>
        </header>

        <!-- 主体：左侧栏 + 右侧内容 -->
        <div class="main-layout">
            <!-- 左侧功能栏 -->
            <nav class="sidebar">
                <div class="sidebar-btn active" @click="quickSend('')" data-label="AI对话">
                    <span class="sidebar-icon">🤖</span> AI 对话
                </div>
                <div class="sidebar-btn" @click="quickSend('最近有什么通知？')">
                    <span class="sidebar-icon">📢</span> 最近通知
                </div>
                <div class="sidebar-btn" @click="quickSend('期末考试是什么时候？')">
                    <span class="sidebar-icon">📝</span> 考试安排
                </div>
                <div class="sidebar-btn" @click="quickSend('图书馆什么时候开门？')">
                    <span class="sidebar-icon">📚</span> 图书馆
                </div>
                <div class="sidebar-btn" @click="quickSend('奖学金评选结果是什么？')">
                    <span class="sidebar-icon">🏆</span> 奖学金
                </div>
                <div class="sidebar-btn" @click="quickSend('毕业生需要办理什么手续？')">
                    <span class="sidebar-icon">🎓</span> 毕业手续
                </div>
            </nav>

            <!-- 右侧内容 -->
            <div class="content-area">
                <!-- 欢迎卡片 -->
                <div class="welcome-card">
                    <!-- 场景背景：左边校门 + 右边操场 -->
                    <svg class="scene-layer" viewBox="0 0 600 180" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stop-color="#D6E8FA" stop-opacity="0.7"/>
                                <stop offset="100%" stop-color="#F2F7FC" stop-opacity="0.9"/>
                            </linearGradient>
                            <linearGradient id="groundMid" x1="0" y1="0" x2="1" y2="0">
                                <stop offset="0%" stop-color="#D4E0D0" stop-opacity="0.5"/>
                                <stop offset="50%" stop-color="#E2EBE0" stop-opacity="0.6"/>
                                <stop offset="100%" stop-color="#D0E0C8" stop-opacity="0.5"/>
                            </linearGradient>
                        </defs>
                        <!-- 天空 -->
                        <rect width="600" height="180" fill="url(#skyGrad)"/>
                        <!-- 远处云 -->
                        <ellipse cx="300" cy="22" rx="50" ry="12" fill="white" opacity="0.5"/>
                        <ellipse cx="320" cy="18" rx="35" ry="9" fill="white" opacity="0.4"/>
                        <!-- ====== 左边：FJUT 校门 ====== -->
                        <!-- 地面 -->
                        <rect x="0" y="120" width="300" height="60" fill="url(#groundMid)"/>
                        <!-- 门柱左 -->
                        <rect x="55" y="35" width="14" height="100" fill="#C8D0D8" rx="1"/>
                        <rect x="55" y="30" width="14" height="10" fill="#B8C0C8" rx="2"/>
                        <!-- 门柱右 -->
                        <rect x="200" y="35" width="14" height="100" fill="#C8D0D8" rx="1"/>
                        <rect x="200" y="30" width="14" height="10" fill="#B8C0C8" rx="2"/>
                        <!-- 横梁 -->
                        <rect x="50" y="38" width="169" height="10" fill="#BCC4CC" rx="2"/>
                        <!-- 校名牌 -->
                        <rect x="70" y="50" width="129" height="26" fill="#2C5F9E" rx="4"/>
                        <text x="134" y="68" text-anchor="middle" fill="white" font-size="10" font-weight="700" letter-spacing="1">福建理工大学</text>
                        <!-- 铁门 -->
                        <rect x="69" y="78" width="58" height="57" fill="#D8DDE2" rx="1" opacity="0.7"/>
                        <rect x="142" y="78" width="58" height="57" fill="#D8DDE2" rx="1" opacity="0.7"/>
                        <line x1="98" y1="80" x2="98" y2="133" stroke="#C0C8D0" stroke-width="1.5"/>
                        <line x1="171" y1="80" x2="171" y2="133" stroke="#C0C8D0" stroke-width="1.5"/>
                        <!-- 校门左侧树 -->
                        <circle cx="32" cy="105" r="18" fill="#A0C8A0" opacity="0.5"/>
                        <rect x="29" y="118" width="6" height="20" fill="#B8C0A8" rx="2"/>
                        <!-- 校门右侧灌木 -->
                        <ellipse cx="240" cy="120" rx="20" ry="12" fill="#A8C8A8" opacity="0.45"/>
                        <ellipse cx="255" cy="122" rx="14" ry="8" fill="#B0CCB0" opacity="0.4"/>
                        <!-- 路面 -->
                        <rect x="0" y="133" width="280" height="30" fill="#D8DCD8" opacity="0.5"/>

                        <!-- ====== 右边：操场 ====== -->
                        <!-- 地面 -->
                        <rect x="300" y="120" width="300" height="60" fill="#DCE8D8" opacity="0.55"/>
                        <!-- 足球场绿地 -->
                        <rect x="320" y="100" width="260" height="55" fill="#B8D4A8" rx="4" opacity="0.55"/>
                        <!-- 跑道 -->
                        <rect x="310" y="92" width="280" height="70" fill="none" stroke="#C8C0A0" stroke-width="2" rx="6" opacity="0.6"/>
                        <rect x="318" y="98" width="264" height="58" fill="none" stroke="#D0C8A8" stroke-width="1.5" rx="4" opacity="0.5"/>
                        <!-- 跑道线 -->
                        <line x1="450" y1="92" x2="450" y2="162" stroke="#CCC4A8" stroke-width="1" opacity="0.5"/>
                        <line x1="450" y1="98" x2="450" y2="156" stroke="#D4CCA8" stroke-width="1" opacity="0.4"/>
                        <!-- 中线 -->
                        <line x1="320" y1="127" x2="590" y2="127" stroke="#C0D0A0" stroke-width="1" opacity="0.5"/>
                        <!-- 中圈 -->
                        <circle cx="450" cy="127" r="18" fill="none" stroke="#C0D0A0" stroke-width="1" opacity="0.5"/>
                        <!-- 球门 -->
                        <rect x="318" y="115" width="4" height="24" fill="white" stroke="#D0C8B0" stroke-width="0.8" rx="1" opacity="0.6"/>
                        <rect x="578" y="115" width="4" height="24" fill="white" stroke="#D0C8B0" stroke-width="0.8" rx="1" opacity="0.6"/>
                        <!-- 操场边看台台阶 -->
                        <rect x="300" y="100" width="12" height="55" fill="#E0DDD5" opacity="0.5" rx="1"/>
                        <line x1="300" y1="112" x2="312" y2="112" stroke="#D4D0C8" stroke-width="0.8" opacity="0.5"/>
                        <line x1="300" y1="124" x2="312" y2="124" stroke="#D4D0C8" stroke-width="0.8" opacity="0.5"/>
                        <line x1="300" y1="136" x2="312" y2="136" stroke="#D4D0C8" stroke-width="0.8" opacity="0.5"/>
                        <!-- 操场边树 -->
                        <circle cx="595" cy="108" r="14" fill="#A0C0A0" opacity="0.45"/>
                        <rect x="592" y="118" width="5" height="16" fill="#B4BCA8" rx="2"/>
                    </svg>

                    <!-- 右下角三只猪头 -->
                    <svg class="pigs-logo" viewBox="0 0 220 70" width="150" height="48">

<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            inputText: '',
            sending: false,
            messages: [
                { role: 'ai', content: '你好呀！我是 FJUT 校园 AI 助手 ✨\n有什么可以帮你的？尽管问我吧～' }
            ]
        };
    },
    methods: {
        async send() {
            const msg = this.inputText.trim();
            if (!msg || this.sending) return;

            this.messages.push({ role: 'user', content: msg });
            this.inputText = '';
            this.sending = true;

            const loadingMsg = { role: 'ai', content: '', loading: true };
            this.messages.push(loadingMsg);
            this.$nextTick(() => this.scrollBottom());

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });

                const idx = this.messages.indexOf(loadingMsg);
                if (idx > -1) this.messages.splice(idx, 1);

                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error('服务器返回 ' + res.status + ': ' + errText.substring(0, 80));
                }

                const text = await res.text();
                this.messages.push({ role: 'ai', content: text });
            } catch (e) {
                const idx = this.messages.indexOf(loadingMsg);
                if (idx > -1) this.messages.splice(idx, 1);
                this.messages.push({ role: 'ai', content: '❌ ' + (e.message || '网络错误，请确保后端已启动哦～') });
            }

            this.sending = false;
            this.$nextTick(() => {
                this.scrollBottom();
                this.$refs.inputRef?.focus();
            });
        },
        quickSend(msg) {
            if (!msg) return;
            this.inputText = msg;
            this.send();
        },
        scrollBottom() {
            const el = this.$refs.msgContainer;
            if (el) el.scrollTop = el.scrollHeight;
        }
    },
    mounted() {
        this.$refs.inputRef?.focus();
    }
}).mount('#app');
</script>
