<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FJUT · 校园AI助手</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        :root {
            --blue: #5B9BD5; --blue-light: #A8D4F0; --blue-pale: #E8F4FD;
            --blue-deep: #2C5F9E; --white: #FFFFFF; --text: #3A3A4A;
            --text-light: #6B6B7B; --shadow: 0 4px 20px rgba(91,155,213,0.15);
            --shadow-hover: 0 8px 30px rgba(91,155,213,0.25);
            --pink: #F8BBD0; --red: #E74C3C; --green: #27AE60;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC','Microsoft YaHei','Noto Sans SC',-apple-system,sans-serif;
            background: linear-gradient(180deg,#E8F4FD 0%,#D6ECFA 30%,#F0F7FD 60%,#FFFFFF 100%);
            background-attachment: fixed; min-height: 100vh; position: relative;
            overflow-x: hidden; color: var(--text);
        }

        /* ── 背景装饰 ── */
        .bg-decor { position: fixed; pointer-events: none; z-index: 0; }
        .cloud { background: rgba(255,255,255,0.7); border-radius: 50%; filter: blur(2px); }
        .cloud-1 { width:180px; height:60px; top:8%; left:5%; animation:floatCloud 8s ease-in-out infinite; }
        .cloud-2 { width:140px; height:48px; top:15%; right:8%; animation:floatCloud 10s ease-in-out infinite 2s; }
        .cloud-3 { width:120px; height:42px; top:65%; left:2%; animation:floatCloud 9s ease-in-out infinite 1s; }
        .cloud-4 { width:100px; height:36px; top:75%; right:5%; animation:floatCloud 7s ease-in-out infinite 3s; }
        .dot { background: rgba(91,155,213,0.12); border-radius: 50%; }
        .dot-1 { width:24px; height:24px; top:25%; left:10%; animation:bounceDot 3s ease-in-out infinite; }
        .dot-2 { width:16px; height:16px; top:40%; right:12%; animation:bounceDot 4s ease-in-out infinite 1s; }
        .dot-3 { width:20px; height:20px; top:55%; left:88%; animation:bounceDot 3.5s ease-in-out infinite 0.5s; }
        .dot-4 { width:12px; height:12px; top:80%; left:15%; animation:bounceDot 3.2s ease-in-out infinite 2s; }
        .pig-decor { opacity:0.3; }
        .pig-decor-1 { top:40%; left:3%; animation:floatPig 9s ease-in-out infinite; }
        .pig-decor-2 { top:70%; right:3%; animation:floatPig 7s ease-in-out infinite 3s; }
        @keyframes floatCloud { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
        @keyframes bounceDot { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-18px) scale(1.3)} }
        @keyframes floatPig { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-10px) rotate(3deg)} }

        /* ── 登录遮罩 ── */
        .login-overlay {
            position: fixed; inset:0; z-index:100;
            background: linear-gradient(180deg, #C9E4F2 0%, #A8D4EA 15%, #D6ECFA 35%, #E8F4FD 55%, #B8D8E8 75%, #C5DCE8 100%);
            backdrop-filter: blur(3px);
            display:flex; align-items:center; justify-content:center;
            overflow:hidden;
        }
        /* 校园场景背景 */
        .campus-scene-bg {
            position:absolute; inset:0; pointer-events:none; z-index:0;
            display:flex; align-items:flex-end; justify-content:center;
            opacity:0.35;
        }
        .campus-scene-bg svg { width:100%; height:100%; }
        .login-card {
            background: var(--white); border-radius:24px; padding:0; width:380px;
            max-width:92vw; box-shadow: 0 20px 60px rgba(44,95,158,0.25);
            text-align:center; animation: fadeInUp 0.5s cubic-bezier(.34,1.56,.64,1);
            overflow:hidden; position:relative; z-index:1;
        }
        /* 卡片顶部蓝白装饰条 — 柔和过渡 */
        .login-card-top {
            background: linear-gradient(180deg, #F5F9FC 0%, #FFFFFF 100%);
            padding:24px 36px 8px;
            position:relative;
            border-bottom:2px solid var(--blue-pale);
        }
        .login-card-top::after {
            content:''; position:absolute; bottom:-1px; left:20%; right:20%; height:2px;
            background:linear-gradient(90deg, transparent, #C8E0F4, transparent);
            border-radius:50%;
        }
        .login-card-body { padding:16px 36px 32px; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        .login-card .login-logo-img { width:56px; height:56px; border-radius:50%; object-fit:cover; display:block; margin:0 auto 8px; box-shadow:0 3px 14px rgba(255,183,77,0.3); }
        .login-card .login-welcome { font-size:11px; color:var(--blue); letter-spacing:4px; text-transform:uppercase; margin-bottom:2px; }
        .login-card h2 { font-size:20px; color:var(--blue-deep); margin-bottom:4px; }
        .login-card .login-sub { font-size:12px; color:var(--blue-light); margin-bottom:20px; letter-spacing:2px; }
        .login-card input {
            width:100%; padding:12px 16px; margin-bottom:12px;
            border:2px solid var(--blue-pale); border-radius:14px; font-size:14px;
            outline:none; background:#F8FBFE; color:var(--text); transition:all 0.3s;
        }
        .login-card input:focus { border-color:var(--blue); box-shadow:0 0 0 4px rgba(91,155,213,0.1); }
        .login-card .login-btn {
            width:100%; padding:12px; background:linear-gradient(135deg,#5B9BD5,#3D7EC0);
            color:#fff; border:none; border-radius:14px; font-size:15px; font-weight:600;
            cursor:pointer; transition:all 0.25s; margin-top:6px; letter-spacing:2px;
        }
        .login-card .login-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(91,155,213,0.35); }
        .login-card .login-btn:disabled { background:#C8D9E8; cursor:not-allowed; transform:none; box-shadow:none; }
        .login-error { color:var(--red); font-size:12px; margin-top:8px; }
        .login-hint { font-size:11px; color:var(--text-light); margin-top:16px; line-height:1.8; }

        /* ── 主布局 ── */
        #app { position:relative; z-index:1; max-width:960px; margin:0 auto; padding:0 16px 20px; min-height:100vh; display:flex; flex-direction:column; }

        /* 顶部用户栏 */
        .user-bar {
            display:flex; align-items:center; justify-content:flex-end;
            padding:8px 0; gap:10px;
        }
        .user-badge {
            display:flex; align-items:center; gap:6px;
            padding:5px 12px; border-radius:20px; font-size:12px; font-weight:600;
            background:var(--white); border:2px solid var(--blue-pale);
        }
        .user-badge.teacher { border-color:#5B9BD5; color:var(--blue-deep); }
        .user-badge.student { border-color:#A8D4F0; color:var(--blue); }
        .logout-btn {
            padding:5px 14px; border-radius:20px; font-size:11px; cursor:pointer;
            background:var(--white); border:2px solid #F0D0D0; color:#C0392B;
            transition:all 0.25s; font-weight:500;
        }
        .logout-btn:hover { background:#FFF0F0; border-color:#E0A0A0; }

        .brand-header { text-align:center; padding:16px 0 10px; }
        .brand-logo { display:inline-block; background:linear-gradient(135deg,#2C5F9E,#5B9BD5); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .brand-logo h1 { font-size:26px; font-weight:800; letter-spacing:2px; }
        .brand-sub { font-size:12px; color:var(--blue); letter-spacing:4px; margin-top:2px; }

        .main-layout { display:flex; gap:14px; flex:1; min-height:0; }

        /* ── 左侧导航 ── */
        .sidebar { width:130px; flex-shrink:0; display:flex; flex-direction:column; gap:6px; }
        .nav-main-btn {
            display:flex; align-items:center; gap:8px; padding:12px 14px;
            background:var(--white); border:2px solid var(--blue-pale);
            border-radius:16px; font-size:13px; cursor:pointer; color:var(--blue-deep);
            font-weight:600; transition:all 0.25s cubic-bezier(.34,1.56,.64,1);
            user-select:none; white-space:nowrap;
        }
        .nav-main-btn:hover { background:#E8F4FD; border-color:var(--blue-light); transform:translateX(3px); box-shadow:0 4px 12px rgba(91,155,213,0.18); }
        .nav-main-btn:active { transform:scale(0.96); }
        .nav-main-btn.active { background:linear-gradient(135deg,#5B9BD5,#4A8BC5); color:#fff; border-color:transparent; box-shadow:0 4px 14px rgba(91,155,213,0.3); }
        .nav-icon { font-size:18px; flex-shrink:0; }
        .nav-arrow { margin-left:auto; font-size:11px; transition:transform 0.3s; }
        .nav-arrow.open { transform:rotate(90deg); }

        .submenu-wrap { overflow:hidden; transition:max-height 0.35s ease,opacity 0.3s ease; opacity:0; max-height:0; }
        .submenu-wrap.open { opacity:1; max-height:500px; }
        .submenu-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:2px 2px 2px 10px; }
        .submenu-grid-item {
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            gap:4px; aspect-ratio:1; background:var(--white); border:2px solid var(--blue-pale);
            border-radius:14px; cursor:pointer; transition:all 0.25s cubic-bezier(.34,1.56,.64,1);
            user-select:none; position:relative;
        }
        .submenu-grid-item:hover { background:#E8F4FD; border-color:var(--blue-light); transform:translateY(-2px); box-shadow:0 4px 12px rgba(91,155,213,0.18); }
        .submenu-grid-item:active { transform:scale(0.94); }
        .submenu-grid-item.active { background:linear-gradient(135deg,#5B9BD5,#4A8BC5); color:#fff; border-color:transparent; box-shadow:0 4px 14px rgba(91,155,213,0.3); }
        .submenu-grid-item .sq-icon { font-size:22px; }
        .submenu-grid-item .sq-label { font-size:10px; font-weight:500; }
        .red-dot {
            position:absolute; top:6px; right:6px; width:10px; height:10px;
            background:var(--red); border-radius:50%; border:2px solid #fff;
        }
        .submenu-list { display:flex; flex-direction:column; gap:5px; padding:2px 2px 2px 16px; }
        .submenu-list-item {
            display:flex; align-items:center; gap:8px; padding:10px 12px;
            background:var(--white); border:2px solid var(--blue-pale);
            border-radius:12px; font-size:12px; cursor:pointer; color:var(--blue-deep);
            font-weight:500; transition:all 0.25s cubic-bezier(.34,1.56,.64,1); user-select:none;
        }
        .submenu-list-item:hover { background:#E8F4FD; border-color:var(--blue-light); transform:translateX(2px); box-shadow:0 4px 12px rgba(91,155,213,0.15); }
        .submenu-list-item:active { transform:scale(0.96); }
        .submenu-list-item.active { background:linear-gradient(135deg,#5B9BD5,#4A8BC5); color:#fff; border-color:transparent; box-shadow:0 4px 14px rgba(91,155,213,0.3); }
        .submenu-list-item .li-icon { font-size:16px; flex-shrink:0; }

        /* ── 右侧内容区 ── */
        .content-area { flex:1; min-width:0; display:flex; flex-direction:column; gap:12px; }

        /* 欢迎卡片 */
        .welcome-card {
            position:relative; border-radius:20px; padding:0; box-shadow:var(--shadow);
            text-align:center; border:2px solid var(--blue-pale); overflow:hidden;
            background:#fff; min-height:170px; display:flex; align-items:center; justify-content:center;
        }
        .scene-layer { position:absolute; inset:0; pointer-events:none; z-index:0; }
        .welcome-card .content-wrap { position:relative; z-index:2; padding:22px 24px; }
        .welcome-avatar { font-size:46px; display:block; margin-bottom:6px; text-shadow:0 2px 8px rgba(255,255,255,0.8); }
        .welcome-card h2 { font-size:17px; color:var(--blue-deep); margin-bottom:4px; text-shadow:0 1px 4px rgba(255,255,255,0.7); }
        .welcome-card p { font-size:13px; color:var(--text-light); line-height:1.6; text-shadow:0 1px 4px rgba(255,255,255,0.6); }
        .welcome-card:hover .brand-logo { opacity:0.85; }

        /* 聊天卡片 */
        .chat-card {
            flex:1; background:var(--white); border-radius:20px; box-shadow:var(--shadow);
            display:flex; flex-direction:column; overflow:hidden; border:2px solid var(--blue-pale);
            min-height:380px; max-height:50vh;
        }
        .chat-header-bar {
            display:flex; align-items:center; gap:8px; padding:10px 16px;
            border-bottom:2px solid var(--blue-pale); background:#FAFCFE;
        }
        .chat-header-btn {
            padding:5px 10px; border-radius:12px; border:2px solid var(--blue-pale);
            background:var(--white); cursor:pointer; font-size:11px; color:var(--blue-deep);
            transition:all 0.25s; font-weight:500; display:flex; align-items:center; gap:4px;
        }
        .chat-header-btn:hover { background:#E8F4FD; border-color:var(--blue-light); }
        .chat-header-btn .btn-icon { font-size:14px; }
        .session-title { flex:1; font-size:13px; color:var(--text-light); text-align:center; }
        .chat-messages { flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth; }
        .chat-messages::-webkit-scrollbar { width:5px; }
        .chat-messages::-webkit-scrollbar-thumb { background:var(--blue-light); border-radius:10px; }

        /* 消息气泡 */
        .msg-row { display:flex; gap:8px; max-width:85%; animation:msgIn 0.35s cubic-bezier(.34,1.56,.64,1); }
        @keyframes msgIn { from{opacity:0;transform:translateY(12px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }
        .msg-row.ai { align-self:flex-start; }
        .msg-row.user { align-self:flex-end; flex-direction:row-reverse; }
        .msg-avatar { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; background:var(--blue-pale); }
        .msg-row.user .msg-avatar { background:#D6E8FB; }
        .msg-bubble { padding:10px 14px; border-radius:18px; font-size:13.5px; line-height:1.65; word-break:break-word; white-space:pre-wrap; position:relative; }
        .msg-row.ai .msg-bubble { background:#F0F6FB; color:var(--text); border-bottom-left-radius:5px; }
        .msg-row.user .msg-bubble { background:linear-gradient(135deg,#5B9BD5,#4A8BC5); color:#fff; border-bottom-right-radius:5px; }
        .loading-dots { display:flex; gap:5px; padding:4px 0; }
        .loading-dots span { width:7px; height:7px; background:var(--blue-light); border-radius:50%; animation:dotBounce 1.2s ease-in-out infinite; }
        .loading-dots span:nth-child(2) { animation-delay:0.2s; }
        .loading-dots span:nth-child(3) { animation-delay:0.4s; }
        @keyframes dotBounce { 0%,80%,100%{transform:scale(0.6); opacity:0.4} 40%{transform:scale(1.3); opacity:1} }

        .map-quick-link {
            display:inline-block; margin-top:8px; padding:6px 14px;
            background:linear-gradient(135deg,#5B9BD5,#3D7EC0); color:#fff;
            border-radius:20px; font-size:12px; font-weight:600; text-decoration:none;
            cursor:pointer; transition:all 0.25s;
        }
        .map-quick-link:hover { transform:translateY(-2px); box-shadow:0 4px 14px rgba(91,155,213,0.35); }

        .input-area { display:flex; gap:8px; padding:10px 14px 14px; border-top:2px solid var(--blue-pale); }
        .input-area input { flex:1; padding:10px 16px; border:2px solid #D6E8FA; border-radius:22px; font-size:13.5px; outline:none; background:#F8FBFE; color:var(--text); transition:all 0.3s; }
        .input-area input:focus { border-color:var(--blue); background:#fff; box-shadow:0 0 0 4px rgba(91,155,213,0.1); }
        .input-area input::placeholder { color:#B0C8DD; }
        .send-btn { width:44px; height:44px; background:linear-gradient(135deg,#5B9BD5,#3D7EC0); color:#fff; border:none; border-radius:50%; font-size:18px; cursor:pointer; transition:all 0.25s cubic-bezier(.34,1.56,.64,1); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
        .send-btn:hover { transform:scale(1.1); box-shadow:0 4px 16px rgba(91,155,213,0.4); }
        .send-btn:active { transform:scale(0.92); }
        .send-btn:disabled { background:#C8D9E8; cursor:not-allowed; transform:none; box-shadow:none; }

        /* ── 历史会话面板 ── */
        .history-panel {
            background:var(--white); border-radius:20px; box-shadow:var(--shadow);
            border:2px solid var(--blue-pale); flex:1; display:flex; flex-direction:column;
            overflow:hidden; min-height:380px;
        }
        .history-panel-header {
            display:flex; align-items:center; gap:12px; padding:14px 16px;
            border-bottom:2px solid var(--blue-pale); background:#FAFCFE;
        }
        .history-panel-header .back-btn {
            width:32px; height:32px; border-radius:50%; border:2px solid var(--blue-pale);
            background:var(--white); cursor:pointer; font-size:15px; color:var(--blue-deep);
            display:flex; align-items:center; justify-content:center; transition:all 0.25s;
        }
        .history-panel-header .back-btn:hover { background:var(--blue-pale); border-color:var(--blue-light); }
        .history-list { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
        .history-item {
            padding:12px 14px; background:#F8FBFE; border:1px solid var(--blue-pale);
            border-radius:14px; cursor:pointer; transition:all 0.25s;
            display:flex; align-items:center; justify-content:space-between;
        }
        .history-item:hover { background:#E8F4FD; border-color:var(--blue-light); }
        .history-item-info { flex:1; min-width:0; }
        .history-item-title { font-size:13px; font-weight:600; color:var(--blue-deep); margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .history-item-time { font-size:11px; color:var(--blue-light); }
        .history-item-del {
            width:28px; height:28px; border-radius:50%; border:none;
            background:#FFF0F0; color:#E74C3C; cursor:pointer; font-size:13px;
            transition:all 0.25s; flex-shrink:0; margin-left:8px;
        }
        .history-item-del:hover { background:#FDD; }
        .history-empty { text-align:center; padding:40px 20px; color:var(--text-light); font-size:13px; }

        /* ── 退出确认弹窗 ── */
        .modal-overlay {
            position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.35);
            display:flex; align-items:center; justify-content:center;
        }
        .modal-card {
            background:#fff; border-radius:20px; padding:28px 24px; width:340px;
            max-width:90vw; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.2);
            animation:fadeInUp 0.3s cubic-bezier(.34,1.56,.64,1);
        }
        .modal-card h3 { font-size:17px; color:var(--blue-deep); margin-bottom:6px; }
        .modal-card p { font-size:13px; color:var(--text-light); margin-bottom:18px; line-height:1.6; }
        .modal-btns { display:flex; gap:10px; justify-content:center; }
        .modal-btn {
            padding:10px 24px; border-radius:14px; font-size:13px; font-weight:600;
            cursor:pointer; transition:all 0.25s; border:2px solid transparent;
        }
        .modal-btn.primary { background:linear-gradient(135deg,#5B9BD5,#3D7EC0); color:#fff; }
        .modal-btn.primary:hover { box-shadow:0 4px 14px rgba(91,155,213,0.35); transform:translateY(-1px); }
        .modal-btn.secondary { background:#fff; color:var(--text); border-color:var(--blue-pale); }
        .modal-btn.secondary:hover { background:#F0F5FA; }

        /* ── 信息查询详情页 ── */
        .info-page { flex:1; background:var(--white); border-radius:20px; box-shadow:var(--shadow); border:2px solid var(--blue-pale); display:flex; flex-direction:column; overflow:hidden; min-height:400px; }
        .info-page-header { display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:2px solid var(--blue-pale); background:#FAFCFE; }
        .info-page-header .back-btn { width:32px; height:32px; border-radius:50%; border:2px solid var(--blue-pale); background:var(--white); cursor:pointer; font-size:15px; color:var(--blue-deep); display:flex; align-items:center; justify-content:center; transition:all 0.25s; }
        .info-page-header .back-btn:hover { background:var(--blue-pale); border-color:var(--blue-light); }
        .info-page-header .page-title { font-size:16px; font-weight:700; color:var(--blue-deep); }
        .info-page-header .header-actions { margin-left:auto; display:flex; gap:8px; }
        .action-btn {
            padding:6px 14px; border-radius:12px; font-size:12px; font-weight:600; cursor:pointer;
            transition:all 0.25s; border:2px solid transparent;
        }
        .action-btn.publish { background:linear-gradient(135deg,#5B9BD5,#3D7EC0); color:#fff; }
        .action-btn.publish:hover { box-shadow:0 4px 12px rgba(91,155,213,0.35); transform:translateY(-1px); }
        .info-page-body { flex:1; padding:20px; overflow-y:auto; }
        .info-page-body::-webkit-scrollbar { width:5px; }
        .info-page-body::-webkit-scrollbar-thumb { background:var(--blue-light); border-radius:10px; }

        .notice-list { display:flex; flex-direction:column; gap:10px; }
        .notice-item { padding:14px 16px; background:#F8FBFE; border-radius:14px; border:1px solid var(--blue-pale); transition:all 0.25s; position:relative; }
        .notice-item:hover { background:#E8F4FD; border-color:var(--blue-light); }
        .notice-item.new-notice { border-left:3px solid var(--red); }
        .notice-item .notice-title { font-size:14px; font-weight:600; color:var(--blue-deep); margin-bottom:6px; }
        .notice-item .notice-content { font-size:13px; color:var(--text-light); line-height:1.6; }
        .notice-item .notice-time { font-size:11px; color:var(--blue-light); margin-top:6px; }
        .notice-item .notice-actions { position:absolute; top:12px; right:12px; display:flex; gap:6px; }
        .notice-action-icon {
            width:30px; height:30px; border-radius:50%; border:2px solid var(--blue-pale);
            background:var(--white); cursor:pointer; font-size:13px; display:flex;
            align-items:center; justify-content:center; transition:all 0.25s; color:var(--blue-deep);
        }
        .notice-action-icon:hover { background:var(--blue-pale); border-color:var(--blue-light); }
        .notice-action-icon.del:hover { background:#FFF0F0; border-color:#E0A0A0; color:var(--red); }

        /* 公告表单弹窗 */
        .notice-form-overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.35); display:flex; align-items:center; justify-content:center; }
        .notice-form-card { background:#fff; border-radius:20px; padding:28px 24px; width:420px; max-width:92vw; box-shadow:0 20px 50px rgba(0,0,0,0.2); }
        .notice-form-card h3 { font-size:17px; color:var(--blue-deep); margin-bottom:16px; text-align:center; }
        .notice-form-card input, .notice-form-card textarea {
            width:100%; padding:10px 14px; margin-bottom:12px; border:2px solid var(--blue-pale);
            border-radius:14px; font-size:13px; outline:none; font-family:inherit;
            background:#F8FBFE; color:var(--text); transition:all 0.3s; resize:vertical;
        }
        .notice-form-card textarea { min-height:100px; }
        .notice-form-card input:focus, .notice-form-card textarea:focus { border-color:var(--blue); box-shadow:0 0 0 4px rgba(91,155,213,0.1); }
        .notice-form-card .form-btns { display:flex; gap:10px; justify-content:center; margin-top:4px; }

        .static-info-card { padding:30px 24px; text-align:center; }
        .static-info-card .info-icon { font-size:48px; margin-bottom:12px; }
        .static-info-card h3 { font-size:18px; color:var(--blue-deep); margin-bottom:10px; }
        .static-info-card p { font-size:13px; color:var(--text-light); line-height:1.8; }
        .static-info-card .info-table { margin:16px auto 0; border-collapse:collapse; font-size:13px; text-align:left; }
        .static-info-card .info-table td { padding:8px 16px; border-bottom:1px solid var(--blue-pale); }
        .static-info-card .info-table td:first-child { font-weight:600; color:var(--blue-deep); white-space:nowrap; }

        /* 可折叠卡片 */
        .fold-card { background:var(--white); border-radius:14px; box-shadow:var(--shadow); border:2px solid var(--blue-pale); margin-top:12px; overflow:hidden; }
        .fold-header { padding:14px 18px; cursor:pointer; font-size:15px; font-weight:700; color:var(--blue-deep); display:flex; align-items:center; gap:8px; user-select:none; transition:background 0.2s; }
        .fold-header:hover { background:var(--blue-pale); }
        .fold-arrow { font-size:10px; transition:transform 0.2s; display:inline-block; }
        .fold-arrow.open { transform:rotate(90deg); }
        .fold-body { padding:0 18px 14px; }
        .fold-body .info-table { margin:0; }

        /* 地图 */
        .map-page { flex:1; background:var(--white); border-radius:20px; box-shadow:var(--shadow); border:2px solid var(--blue-pale); display:flex; flex-direction:column; overflow:hidden; min-height:400px; }
        .map-page-header { display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:2px solid var(--blue-pale); background:#FAFCFE; }
        .map-page-header .back-btn { width:32px; height:32px; border-radius:50%; border:2px solid var(--blue-pale); background:var(--white); cursor:pointer; font-size:15px; color:var(--blue-deep); display:flex; align-items:center; justify-content:center; transition:all 0.25s; }
        .map-page-header .back-btn:hover { background:var(--blue-pale); border-color:var(--blue-light); }
        .map-page-header .page-title { font-size:16px; font-weight:700; color:var(--blue-deep); }
        .map-page-body { flex:1; overflow:hidden; position:relative; }
        .map-page-body iframe { width:100%; height:100%; border:none; }
        .map-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-light); background:#F8FBFE; }
        .map-placeholder .ph-icon { font-size:56px; margin-bottom:14px; }
        .map-placeholder .ph-text { font-size:14px; }
        .map2d-gallery { display:flex; flex-direction:column; gap:16px; height:100%; overflow-y:auto; padding:16px; }
        .map2d-gallery img { width:100%; border-radius:14px; box-shadow:0 4px 16px rgba(0,0,0,0.1); cursor:pointer; transition:transform 0.3s; }
        .map2d-gallery img:hover { transform:scale(1.02); }
        /* 侧边装饰背景 */
        .info-card-bg { position:relative; overflow:hidden; }
        .info-card-bg .bg-left, .info-card-bg .bg-right { position:absolute; top:0; bottom:0; pointer-events:none; z-index:0; opacity:0.55; display:flex; align-items:center; }
        .info-card-bg .bg-left { left:8px; }
        .info-card-bg .bg-right { right:8px; }
        .info-card-bg .bg-left svg, .info-card-bg .bg-right svg { height:80%; }
        .info-card-bg > * { position:relative; z-index:1; }
        .empty-state { text-align:center; padding:40px 20px; color:var(--text-light); }

        .brand-footer { text-align:center; padding:18px 0 12px; font-size:12px; color:var(--blue-light); letter-spacing:1px; }
        .footer-pig { vertical-align:middle; margin-right:2px; }
        .brand-footer strong { color:var(--blue); font-weight:700; }

        @media (max-width:650px) {
            .main-layout { flex-direction:column; }
            .sidebar { width:100%; flex-direction:column; gap:6px; }
            .submenu-grid { grid-template-columns:repeat(5,1fr); padding:2px 0; }
            .submenu-list { flex-direction:row; padding:2px 0; }
            .nav-main-btn:hover { transform:translateY(-2px); }
            .chat-card { max-height:45vh; }
            .brand-logo h1 { font-size:22px; }
            .msg-row { max-width:92%; }
            .map-page-body { min-height:300px; }
            .login-card { padding:28px 20px; }
        }
    </style>
</head>

                                    <rect x="40" y="62" width="10" height="12" rx="1" fill="#D8D0A0" opacity="0.7"/><path d="M35 75 L45 65 L55 75Z" fill="#D8D0A0" opacity="0.5"/>
                                    <line x1="60" y1="50" x2="68" y2="30" stroke="#6A7A9A" stroke-width="1.5" opacity="0.7"/><circle cx="68" cy="28" r="3" fill="#6A7A9A" opacity="0.7"/>
                                </svg>
                            </div>
                            <div class="bg-right">
                                <svg viewBox="0 0 120 260" xmlns="http://www.w3.org/2000/svg">
                                    <rect x="30" y="70" width="50" height="65" rx="3" fill="#E8DCC0" opacity="0.7"/><rect x="35" y="78" width="40" height="6" fill="#B09878" opacity="0.5"/><rect x="35" y="90" width="35" height="5" fill="#B09878" opacity="0.45"/><rect x="35" y="100" width="30" height="4" fill="#B09878" opacity="0.4"/>
                                    <circle cx="55" cy="64" r="6" fill="#C03838" opacity="0.7"/><rect x="52" y="64" width="6" height="8" fill="#C03838" opacity="0.6"/>
                                    <line x1="55" y1="135" x2="55" y2="170" stroke="#B8A888" stroke-width="2" opacity="0.6"/><path d="M45 155 L55 145 L65 155" stroke="#B8A888" stroke-width="1.5" fill="none" opacity="0.6"/>
                                </svg>
                            </div>
                            <div class="info-icon">🎓</div><h3>毕业生离校手续办理</h3>
                            <table class="info-table">
                                <tr><td>1. 图书馆</td><td>归还所有借阅图书，结清欠费</td></tr>
                                <tr><td>2. 财务处</td><td>结清学费、住宿费等各项费用</td></tr>
                                <tr><td>3. 宿管中心</td><td>办理退宿手续，退还钥匙</td></tr>
                                <tr><td>4. 学生处</td><td>领取毕业证、学位证</td></tr>
                                <tr><td>5. 档案处</td><td>确认档案转递地址</td></tr>
                            </table>
                            <p style="margin-top:14px;color:var(--blue-light);font-size:12px;">* 办理时间：2026年6月15日 - 6月30日</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Footer -->
        <footer class="brand-footer">
            <strong>FJUT</strong> 福建理工大学 · 校园 AI 助手 · ThreePiggy ©2026
        </footer>
    </template>

    <!-- ========== 公告编辑弹窗 ========== -->
    <div class="notice-form-overlay" v-if="showNoticeForm" @click.self="showNoticeForm = false">
        <div class="notice-form-card">
            <h3>{{ editingNotice ? '编辑公告' : '发布新公告' }}</h3>
            <input v-model="noticeForm.title" placeholder="公告标题">
            <textarea v-model="noticeForm.content" placeholder="公告内容" rows="5"></textarea>
            <div class="form-btns">
                <button class="modal-btn secondary" @click="showNoticeForm = false">取消</button>
                <button class="modal-btn primary" @click="saveNotice" :disabled="savingNotice">
                    {{ savingNotice ? '保存中...' : '发 布' }}
                </button>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            // 登录
            isLoggedIn: false,
            currentUser: null,
            loginForm: { username: '', password: '' },
            loginError: '',
            loggingIn: false,
            // 奖学金折叠面板（s1默认展开）
            folds: { s1: true, s2: false, s3: false, s4: false, s5: false },

            // 导航
            activeMenu: 'chat',
            activeSub: null,
            infoExpanded: false,
            mapExpanded: false,

            // 聊天
            inputText: '',
            sending: false,
            messages: [],
            currentSessionId: null,
            currentSessionTitle: null,
            chatSessions: [],
            showHistory: false,
            showExitModal: false,

            // 公告
            notices: [],
            readNoticeIds: [],
            showNoticeForm: false,
            editingNotice: null,
            noticeForm: { title: '', content: '' },
            savingNotice: false,
            // 课表
            scheduleData: null,
            scheduleLoading: false,
            // 成绩
            gradesData: null,
            gradesLoading: false,
        };
    },
    computed: {
        readNoticeKey() {
            const uid = this.currentUser?.ID || this.currentUser?.id;
            return uid ? 'readNotices_' + uid : 'readNotices_guest';
        },
        isTeacher() {
            const role = this.currentUser?.ROLE || this.currentUser?.role;
            return role === 'teacher';
        },
        unreadNoticeCount() {
            return this.notices.filter(n => !this.readNoticeIds.includes(n.ID || n.id)).length;
        },
        infoPageTitle() {
            const t = { notice:'最近通知', schedule:'课表查询', grades:'成绩查询', exam:'考试安排', library:'图书馆', scholarship:'奖学金', graduate:'毕业手续' };
            return t[this.activeSub] || '信息查询';
        },
        mapPageTitle() {
            return this.activeSub === 'map2d' ? '2D 校园地图' : '3D 校园全景';
        }
    },
    methods: {
        toggleFold(k) { this.folds[k] = !this.folds[k]; },
        // ===== 登录 =====
        async doLogin() {
            const u = this.loginForm.username.trim();
            const p = this.loginForm.password.trim();
            if (!u || !p) { this.loginError = '请输入用户名和密码'; return; }
            this.loggingIn = true; this.loginError = '';
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (data.success) {
                    this.currentUser = data.user;
                    this.isLoggedIn = true;
                    this.loadReadStatus();
                    this.$nextTick(() => this.$refs.inputRef?.focus());
                } else {
                    this.loginError = data.message || '登录失败';
                }
            } catch (e) {
                this.loginError = '网络错误，请确认后端已启动';
            }
            this.loggingIn = false;
        },
        async logout() {
            if (this.messages.length > 1) {
                await this.saveCurrentSession();
            }
            this.doLogout();
        },
        doLogout() {
            this.isLoggedIn = false; this.currentUser = null;
            this.loginForm = { username: '', password: '' };
            this.messages = [{ role: 'ai', content: '你好呀！我是 FJUT 校园 AI 助手 ✨\n有什么可以帮你的？尽管问我吧～' }];
            this.currentSessionId = null;
            this.currentSessionTitle = null;
            this.showHistory = false;
            this.activeMenu = 'chat'; this.activeSub = null;
            this.infoExpanded = false; this.mapExpanded = false;
        },

        // ===== 导航 =====
        switchMenu(menu) {
            this.activeMenu = menu; this.activeSub = null;
            if (menu !== 'info') this.infoExpanded = false;
            if (menu !== 'map') this.mapExpanded = false;
        },
        toggleInfo() {
            this.infoExpanded = !this.infoExpanded;
            if (this.mapExpanded) this.mapExpanded = false;
            if (this.infoExpanded) {
                this.activeMenu = 'info'; this.activeSub = null;
                this.loadNotices();  // 展开时预加载，让红点及时显示
            }
        },
        toggleMap() {
            this.mapExpanded = !this.mapExpanded;
            if (this.infoExpanded) this.infoExpanded = false;
            if (this.mapExpanded) { this.activeMenu = 'map'; this.activeSub = null; }
        },
        openInfoPage(sub) {
            this.activeMenu = 'info'; this.activeSub = sub;
            if (sub === 'notice') this.loadNotices();
            if (sub === 'schedule') this.loadSchedule();
        },
        // ===== 课表查询 =====
        async loadSchedule() {
            this.scheduleLoading = true; this.scheduleData = null;
            const role = this.currentUser?.ROLE || this.currentUser?.role;
            const no = this.currentUser?.TEACHER_NO || this.currentUser?.teacher_no
                    || this.currentUser?.STUDENT_NO || this.currentUser?.student_no;
            try {
                const url = role === 'teacher'
                    ? `/api/teacher/schedule?teacherNo=${encodeURIComponent(no)}`
                    : `/api/student/courses?studentNo=${encodeURIComponent(no)}`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.success) {
                    this.scheduleData = data;
                } else {
                    alert(data.message || '查询失败');
                }
            } catch (e) {
                alert('网络错误，无法加载课表');
            }
            this.scheduleLoading = false;
        },
        // 从聊天快捷方式查看课表
        viewSchedule() {
            this.openInfoPage('schedule');
        },
        // ===== 成绩查询 =====
        async loadGrades() {
            this.gradesLoading = true; this.gradesData = null;
            const no = this.currentUser?.STUDENT_NO || this.currentUser?.student_no;
            try {
                const res = await fetch(`/api/student/grades?studentNo=${encodeURIComponent(no)}`);
                const data = await res.json();
                if (data.success) {
                    this.gradesData = data;
                } else {
                    alert(data.message || '查询失败');
                }
            } catch (e) {
                alert('网络错误，无法加载成绩');
            }
            this.gradesLoading = false;
        },
        viewGrades() {
            this.openInfoPage('grades');
        },
        openMapPage(sub) { this.activeMenu = 'map'; this.activeSub = sub; },
        backToChat() {
            this.activeMenu = 'chat'; this.activeSub = null;
            this.showHistory = false;
            this.$nextTick(() => { this.scrollBottom(); this.$refs.inputRef?.focus(); });
        },

        // ===== 公告 =====
        async loadNotices() {
            this.loadReadStatus();
            try {
                const res = await fetch('/api/notices');
                const data = await res.json();
                if (data.success) this.notices = data.notices;
            } catch (e) { console.error('加载公告失败', e); }
        },
        isRead(id) { return this.readNoticeIds.includes(id); },
        loadReadStatus() {
            const saved = localStorage.getItem(this.readNoticeKey);
            this.readNoticeIds = saved ? JSON.parse(saved) : [];
        },
        saveReadStatus() {
            localStorage.setItem(this.readNoticeKey, JSON.stringify(this.readNoticeIds));
        },
        markRead(id) {
            if (!this.readNoticeIds.includes(id)) {
                this.readNoticeIds.push(id);
                this.saveReadStatus();
            }
        },
        markAllRead() {
            const allIds = this.notices.map(n => n.ID || n.id);
            this.readNoticeIds = [...new Set([...this.readNoticeIds, ...allIds])];
            this.saveReadStatus();
        },
        hasMapLink(text) {
            if (!text) return false;
            const kw = ['地图', '全景', '校园导航', '校园布局', '3D校园', '2D校园', '720'];
            return kw.some(k => text.includes(k));
        },
        jumpToMap() {
            this.activeMenu = 'map';
            this.activeSub = 'map3d';
            this.infoExpanded = false;
            this.mapExpanded = true;
        },
        openNoticeForm(notice) {
            if (notice) {
                this.editingNotice = notice;
                this.noticeForm = { title: notice.TITLE || notice.title, content: notice.CONTENT || notice.content };
            } else {
                this.editingNotice = null;
                this.noticeForm = { title: '', content: '' };
            }
            this.showNoticeForm = true;
        },
        async saveNotice() {
            const { title, content } = this.noticeForm;
            if (!title.trim() || !content.trim()) return;
            this.savingNotice = true;
            try {
                const isEdit = this.editingNotice;
                const url = isEdit ? `/api/notices/${this.editingNotice.ID || this.editingNotice.id}` : '/api/notices';
                const res = await fetch(url, {
                    method: isEdit ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: title.trim(), content: content.trim() })
                });
                const data = await res.json();
                if (data.success) {
                    this.showNoticeForm = false;
                    this.loadNotices();
                } else {
                    alert(data.message || '操作失败');
                }
            } catch (e) { alert('网络错误'); }
            this.savingNotice = false;
        },
        async deleteNoticeItem(notice) {
            if (!confirm('确定删除此公告？')) return;
            const id = notice.ID || notice.id;
            try {
                const res = await fetch(`/api/notices/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    this.readNoticeIds = this.readNoticeIds.filter(rid => rid !== id);
                    localStorage.setItem('readNotices', JSON.stringify(this.readNoticeIds));
                    this.loadNotices();
                }
            } catch (e) { alert('网络错误'); }
        },

        // ===== AI 聊天 =====
        async send() {
            const msg = this.inputText.trim();
            if (!msg || this.sending) return;
            this.messages.push({ role: 'user', content: msg });
            this.inputText = ''; this.sending = true;
            const loadingMsg = { role: 'ai', content: '', loading: true };
            this.messages.push(loadingMsg);
            this.$nextTick(() => this.scrollBottom());
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: msg,
                        userRole: this.currentUser?.role || '',
                        userNo: this.currentUser?.teacher_no || this.currentUser?.student_no || ''
                    })
                });
                const idx = this.messages.indexOf(loadingMsg);
                if (idx > -1) this.messages.splice(idx, 1);
                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error('服务器返回 ' + res.status + ': ' + errText.substring(0, 80));
                }
                // 后端返回 {success, message, sources} JSON，取 message 字段
                const data = await res.json();
                let content = data.message || '';
                // 如果有知识库来源，附加显示
                if (data.sources && data.sources.length > 0) {
                    content += '\n\n📚 参考来源：' + data.sources.join('、');
                }
                this.messages.push({ role: 'ai', content: content });
            } catch (e) {
                const idx = this.messages.indexOf(loadingMsg);
                if (idx > -1) this.messages.splice(idx, 1);
                this.messages.push({ role: 'ai', content: '❌ ' + (e.message || '网络错误') });
            }
            this.sending = false;
            this.$nextTick(() => { this.scrollBottom(); this.$refs.inputRef?.focus(); });
        },
        scrollBottom() {
            const el = this.$refs.msgContainer;
            if (el) el.scrollTop = el.scrollHeight;
        },

        // ===== 聊天历史 =====
        async openHistory() {
            this.showHistory = true;
            await this.loadSessions();
        },
        async newChat() {
            // 自动保存当前会话
            if (this.messages.length > 1) {
                await this.saveCurrentSession();
            }
            this.messages = [{ role: 'ai', content: '你好呀！我是 FJUT 校园 AI 助手 ✨\n有什么可以帮你的？尽管问我吧～' }];
            this.currentSessionId = null;
            this.currentSessionTitle = null;
            this.showHistory = false;
        },
        async loadSessions() {
            if (!this.currentUser) return;
            const uid = this.currentUser.ID || this.currentUser.id;
            try {
                const res = await fetch(`/api/chat/sessions?userId=${uid}`);
                const data = await res.json();
                if (data.success) this.chatSessions = data.sessions || [];
            } catch (e) { console.error('加载会话失败', e); }
        },
        async loadSession(session) {
            const sid = session.ID || session.id;
            try {
                const res = await fetch(`/api/chat/sessions/${sid}/messages`);
                const data = await res.json();
                if (data.success && data.messages) {
                    this.messages = data.messages.map(m => ({
                        role: m.ROLE || m.role,
                        content: m.CONTENT || m.content
                    }));
                    this.currentSessionId = sid;
                    this.currentSessionTitle = session.TITLE || session.title;
                    this.showHistory = false;
                    this.$nextTick(() => this.scrollBottom());
                }
            } catch (e) { console.error('加载消息失败', e); }
        },
        async deleteSession(session) {
            if (!confirm('确定删除此会话？')) return;
            const sid = session.ID || session.id;
            try {
                await fetch(`/api/chat/sessions/${sid}`, { method: 'DELETE' });
                if (this.currentSessionId === sid) {
                    this.currentSessionId = null;
                    this.currentSessionTitle = null;
                }
                this.loadSessions();
            } catch (e) { console.error('删除失败', e); }
        },
        async exitAndSave() {
            await this.saveCurrentSession();
            this.messages = [{ role: 'ai', content: '你好呀！我是 FJUT 校园 AI 助手 ✨\n有什么可以帮你的？尽管问我吧～' }];
            this.currentSessionId = null;
            this.currentSessionTitle = null;
        },
        async saveCurrentSession() {
            if (this.messages.length <= 1) return;
            const uid = this.currentUser?.ID || this.currentUser?.id;
            if (!uid) return;
            // 生成标题：取第一条用户消息的前20字
            const firstUserMsg = this.messages.find(m => m.role === 'user');
            const title = firstUserMsg ? firstUserMsg.content.substring(0, 20) : '对话记录';
            try {
                // 创建 session
                const sRes = await fetch('/api/chat/sessions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: uid, title })
                });
                const sData = await sRes.json();
                if (sData.success && sData.session) {
                    const sid = sData.session.ID || sData.session.id;
                    // 保存所有消息
                    for (const m of this.messages) {
                        if (m.loading) continue;
                        await fetch(`/api/chat/sessions/${sid}/messages`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ role: m.role, content: m.content })
                        });
                    }
                }
            } catch (e) { console.error('保存会话失败', e); }
        },
        formatTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }
    },
    mounted() {
        // 页面加载时聚焦登录框
    }
}).mount('#app');
</script>
</body>
</html>
